<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGA Fantasy Golf Model &mdash; Advanced Projections</title>
<style>
:root {
  --bg:#0b0e14; --s1:#131720; --s2:#1a1f2e; --s3:#232a3b;
  --border:#2a3148; --green:#00d4aa; --green2:#00b894; --green-d:#00d4aa20;
  --blue:#5ba4f5; --blue-d:#5ba4f520; --gold:#f5c542; --gold-d:#f5c54220;
  --red:#f55a5a; --red-d:#f55a5a20; --purple:#a78bfa; --purple-d:#a78bfa20;
  --orange:#ff8c42; --orange-d:#ff8c4220; --cyan:#22d3ee;
  --t1:#e8ecf4; --t2:#9aa3bc; --t3:#5d6680;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--t1);line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px} ::-webkit-scrollbar-track{background:var(--s1)} ::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0d2818 0%,#0b0e14 70%);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hdr h1{font-size:22px;font-weight:800;letter-spacing:-.5px} .hdr h1 em{color:var(--green);font-style:normal}
.hdr-r{display:flex;align-items:center;gap:14px}
select.ev{background:var(--s2);border:1px solid var(--border);color:var(--t1);padding:7px 12px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit}
select.ev:focus{outline:none;border-color:var(--green)}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-live{background:var(--green-d);color:var(--green)} .badge-major{background:var(--gold-d);color:var(--gold)}

/* LAYOUT */
.wrap{max-width:1680px;margin:0 auto;padding:20px}
.row{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.col-main{flex:1;min-width:0} .col-side{width:370px;flex-shrink:0}
@media(max-width:1200px){.col-side{width:100%}}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.card-h{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-h h2{font-size:14px;font-weight:700} .card-h .sub{font-size:11px;color:var(--t3)}
.card-b{padding:16px 18px}

/* STAT STRIP */
.stats-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:16px}
@media(max-width:1000px){.stats-strip{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.stats-strip{grid-template-columns:repeat(2,1fr)}}
.scard{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.scard .lb{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.scard .vl{font-size:22px;font-weight:800} .scard .sm{font-size:11px;color:var(--t2);margin-top:2px}

/* TABS */
.tabs{display:flex;gap:0;overflow-x:auto}
.tab{padding:10px 16px;font-size:12px;color:var(--t3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap;transition:.2s}
.tab:hover{color:var(--t2)} .tab.on{color:var(--green);border-bottom-color:var(--green)}

/* CONTROLS */
.ctrl{padding:10px 18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.ctrl input{background:var(--s2);border:1px solid var(--border);color:var(--t1);padding:6px 10px;border-radius:6px;font-size:12px;width:200px;font-family:inherit}
.ctrl input:focus{outline:none;border-color:var(--green)}
.fbtn{background:var(--s2);border:1px solid var(--border);color:var(--t2);padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;transition:.15s}
.fbtn:hover,.fbtn.on{border-color:var(--green);color:var(--green);background:var(--green-d)}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:8px 12px;text-align:left;font-weight:700;color:var(--t3);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none;position:sticky;top:0;background:var(--s1)}
thead th:hover{color:var(--t2)} thead th.sd{color:var(--green)}
thead th[data-tip]{position:relative;cursor:help;text-decoration:underline dotted var(--t3);text-underline-offset:3px}
thead th[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1e2235;color:var(--t1);padding:6px 12px;border-radius:6px;font-size:11px;font-weight:500;text-transform:none;letter-spacing:0;white-space:nowrap;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.5);border:1px solid var(--border);pointer-events:none;animation:fadeIn .15s ease}
thead th[data-tip]:hover::before{content:'';position:absolute;bottom:calc(100% + 1px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1e2235;z-index:101;pointer-events:none}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s} tbody tr:hover{background:var(--s2)}
tbody td{padding:7px 12px;white-space:nowrap}
.rk{font-weight:800;color:var(--t3);width:32px;text-align:center}
.rk-1{color:var(--gold)} .rk-2{color:#c0c0c0} .rk-3{color:#cd7f32}
.pc{display:flex;align-items:center;gap:8px}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;flex-shrink:0}
.pn{font-weight:700;font-size:12px} .py{font-size:10px;color:var(--t3)}
.sg-p{color:var(--green)} .sg-n{color:var(--red)}
.bar{width:55px;height:5px;background:var(--s3);border-radius:3px;display:inline-block;vertical-align:middle;margin-left:5px;overflow:hidden}
.bar-f{height:100%;border-radius:3px}
.tier{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.tier-s{background:var(--gold-d);color:var(--gold)} .tier-a{background:var(--green-d);color:var(--green)} .tier-b{background:var(--blue-d);color:var(--blue)} .tier-c{background:var(--purple-d);color:var(--t2)}
.abtn{background:var(--green-d);border:1px solid var(--green);color:var(--green);padding:2px 8px;border-radius:5px;font-size:10px;cursor:pointer;font-family:inherit;transition:.15s}
.abtn:hover{background:var(--green);color:var(--bg)} .abtn.in{background:var(--green);color:var(--bg)}
.lev{font-weight:700} .lev-pos{color:var(--green)} .lev-neg{color:var(--red)} .lev-neut{color:var(--t2)}

/* SPARKLINE (CSS mini chart via spans) */
.spark{display:inline-flex;align-items:flex-end;gap:1px;height:20px}
.spark b{width:4px;border-radius:1px 1px 0 0;display:block}

/* SIDEBAR */
.sb-sec{padding:14px 16px;border-bottom:1px solid var(--border)}
.sb-sec:last-child{border-bottom:none}
.sb-sec h3{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.wr{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.wr .wl{font-size:12px;flex:1;color:var(--t1)} .wr .wv{font-size:12px;color:var(--green);width:32px;text-align:right;font-weight:700}
input[type=range]{-webkit-appearance:none;width:110px;height:3px;background:var(--s3);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--green);cursor:pointer}

/* LINEUP */
.ls{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.ls:last-of-type{border-bottom:none}
.ln{width:22px;height:22px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t3)}
.ln.ok{background:var(--green-d);color:var(--green)}
.lp{flex:1;font-size:12px} .lp.mt{color:var(--t3);font-style:italic}
.lsc{font-size:12px;font-weight:700;color:var(--green)}
.lrm{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:0 2px}
.ltot{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.ltot .ll{color:var(--t2);font-size:12px} .ltot .lv{color:var(--green);font-size:16px;font-weight:800}
.sal-bar{height:6px;background:var(--s3);border-radius:3px;margin-top:6px;overflow:hidden}
.sal-bar-f{height:100%;border-radius:3px;transition:width .3s}

/* COURSE BARS */
.cb-r{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.cb-l{width:90px;font-size:11px;color:var(--t2);text-align:right}
.cb{flex:1;height:18px;background:var(--s3);border-radius:3px;position:relative;overflow:hidden}
.cb-f{height:100%;border-radius:3px}
.cb-v{position:absolute;right:5px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:700}

/* VALUE PICKS */
.vp-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:border-color .15s}
.vp-card:hover{border-color:var(--green)}
.vp-rank{font-size:20px;font-weight:900;color:var(--green);width:32px;text-align:center}
.vp-info{flex:1}
.vp-name{font-weight:700;font-size:13px} .vp-meta{font-size:11px;color:var(--t2)}
.vp-right{text-align:right}
.vp-val{font-size:16px;font-weight:800;color:var(--green)} .vp-sal{font-size:10px;color:var(--t3)}

/* RADAR (SVG) */
.radar-wrap{display:flex;justify-content:center;padding:8px 0}

/* FORM TREND */
.form-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-top:4px}
.form-cell{text-align:center;font-size:9px;font-weight:700;padding:3px 0;border-radius:3px}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card,.scard{animation:fadeIn .35s ease}
</style>
</head>
<body>

<div class="hdr">
  <h1>&#9971; PGA Fantasy <em>Projections</em></h1>
  <div class="hdr-r">
    <select class="ev" id="evSel" onchange="changeEvent()"></select>
    <span class="badge badge-live">MODEL v2.0</span>
    <span class="badge badge-major" id="evTypeBadge"></span>
  </div>
</div>

<div class="wrap">
  <div class="stats-strip" id="statsStrip"></div>

  <div class="row">
    <div class="col-main">
      <!-- Main projections panel -->
      <div class="card" style="margin-bottom:16px">
        <div class="tabs" id="mainTabs"></div>
        <div class="ctrl">
          <input type="text" placeholder="Search players..." id="search" oninput="render()">
          <div id="tierBtns"></div>
        </div>
        <div class="tw" style="max-height:620px;overflow-y:auto">
          <table><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
        </div>
      </div>

      <!-- Value Picks -->
      <div class="card">
        <div class="card-h"><h2>Value Picks &mdash; Best $/Point Plays</h2><span class="sub">Projected score per $1K salary, low ownership edge</span></div>
        <div class="card-b" id="valuePicks"></div>
      </div>
    </div>

    <div class="col-side">
      <!-- Model Weights -->
      <div class="card" style="margin-bottom:12px">
        <div class="card-h"><h2>Model Weights</h2><button class="fbtn" onclick="resetWeights()">Reset</button></div>
        <div class="sb-sec" id="wPanel"></div>
      </div>
      <!-- Lineup Builder -->
      <div class="card" style="margin-bottom:12px">
        <div class="card-h"><h2>DraftKings Lineup (6)</h2><button class="fbtn" onclick="autoLineup()">Auto-Fill</button><button class="fbtn" onclick="clearLineup()" style="margin-left:4px">Clear</button></div>
        <div class="sb-sec" id="luPanel"></div>
      </div>
      <!-- Course Profile -->
      <div class="card" style="margin-bottom:12px">
        <div class="card-h"><h2>Course Profile</h2></div>
        <div class="sb-sec" id="coursePanel"></div>
      </div>
      <!-- Player Radar -->
      <div class="card">
        <div class="card-h"><h2>Player Radar</h2><select class="ev" id="radarSel" onchange="renderRadar()" style="font-size:11px;padding:4px 8px"></select></div>
        <div class="card-b" id="radarPanel"></div>
      </div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
// ===================== DATA ADAPTER =====================
// Normalize EVENTS keys: fetch_data.py uses full names, dashboard uses short names
(function() {
  for (const k in EVENTS) {
    const ev = EVENTS[k];
    if (ev.name && !ev.nm) {
      ev.nm = ev.name;
      ev.cr = ev.course;
      ev.tp = ev.type;
      // sz, par, yds, emph, traits, purse are the same in both formats
    }
  }
})();

// ===================== STATE =====================
let curEv = 'masters', curTab = 'proj', curTier = 'all', sortK = '_score', sortD = -1, lineup = [];
const MAXLU = 6, SALCAP = 50000;
let W = {sgTot:20,sgSplit:18,form:18,courseHist:15,courseFit:12,ballstriking:8,shortGame:9};
const WNAMES = {sgTot:'SG: Total',sgSplit:'SG: Splits (Event-Weighted)',form:'Recent Form (10 events)',courseHist:'Course History',courseFit:'Course Fit Profile',ballstriking:'Ballstriking Stats',shortGame:'Short Game & Scrambling'};
const TABS = [
  {k:'proj',l:'Projections'},
  {k:'sg',l:'Strokes Gained'},
  {k:'form',l:'Form & Trend'},
  {k:'course',l:'Course Fit'},
  {k:'dfs',l:'DFS / Ownership'},
];

// ===================== MODEL ENGINE =====================
function formScore(p) {
  // Weighted recency: most recent events count more. Uses inverse-finish scoring.
  const w = [1.0, 0.92, 0.84, 0.76, 0.68, 0.55, 0.45, 0.38, 0.32, 0.25];
  let s = 0, tw = 0;
  p.form.forEach((f, i) => {
    // Inverse scoring: T1=10, T2=9, T3=8, ... T10+=1
    const pts = Math.max(1, 10 - (f - 1) * 0.8);
    s += pts * w[i]; tw += w[i];
  });
  return s / tw; // 1-10 scale
}

function formTrend(p) {
  // Positive = improving, negative = declining. Compares recent 3 vs older 3.
  const recent = p.form.slice(0, 3).reduce((a, b) => a + b, 0) / 3;
  const older = p.form.slice(5, 8).reduce((a, b) => a + b, 0) / 3;
  return older - recent; // positive = improving
}

function courseHistScore(p, evKey) {
  const hist = p.ch[evKey] || [];
  if (!hist.length) return 5.0; // neutral for no history
  // Best finish weighs most, recency premium
  const sorted = [...hist].sort((a, b) => a - b);
  let s = 0, tw = 0;
  sorted.forEach((f, i) => {
    const wt = 1.0 / (i + 1); // best finishes weigh more
    const pts = Math.max(0.5, 10 - (f - 1) * 0.35);
    s += pts * wt; tw += wt;
  });
  return Math.min(10, s / tw);
}

function courseFitScore(p, evKey) {
  const ev = EVENTS[evKey];
  const e = ev.emph;
  // How well player's SG profile matches course demands
  const playerProfile = [p.sg.ott, p.sg.app, p.sg.atg, p.sg.put];
  const courseProfile = [e.ott, e.app, e.atg, e.put];
  // Dot product normalized
  let fit = 0;
  playerProfile.forEach((v, i) => { fit += v * courseProfile[i] * 10; });
  // Bonus for driving at length-demanding courses
  if (ev.traits.length > 85) fit += (p.dr.dist - 295) * 0.015;
  // Bonus for accuracy at precision courses
  if (ev.traits.precision > 85) fit += (p.dr.acc - 62) * 0.04;
  // Bonus for scrambling at scrambling courses
  if (ev.traits.scrambling > 85) fit += (p.scr - 60) * 0.03;
  return Math.max(0, Math.min(10, fit + 5));
}

function ballstrikingScore(p) {
  return ((p.gir - 60) * 0.3 + (p.dr.dist - 275) * 0.02 + (p.dr.acc - 50) * 0.08) * 0.5 + 3;
}

function shortGameScore(p) {
  return ((p.scr - 50) * 0.15 + (p.sg.atg + 0.5) * 3 + (p.sg.put + 0.5) * 3);
}

function sgSplitScore(p, evKey) {
  const e = EVENTS[evKey].emph;
  return (p.sg.ott * e.ott + p.sg.app * e.app + p.sg.atg * e.atg + p.sg.put * e.put) * 12 + 5;
}

function calcScore(p, evKey) {
  const tw = Object.values(W).reduce((a, b) => a + b, 0);
  const components = {
    sgTot: p.sg.tot * 3.2 + 1,
    sgSplit: sgSplitScore(p, evKey),
    form: formScore(p),
    courseHist: courseHistScore(p, evKey),
    courseFit: courseFitScore(p, evKey),
    ballstriking: ballstrikingScore(p),
    shortGame: shortGameScore(p),
  };
  let score = 0;
  for (const k in components) score += components[k] * (W[k] / tw);
  // Field strength adjustment: smaller fields = stronger competition = slight penalty to lower-ranked
  const ev = EVENTS[evKey];
  if (ev.sz < 100) score *= 0.98 + 0.02 * Math.min(1, score / 10);
  return { score: Math.round(score * 100) / 100, components };
}

function getPlayers() {
  let ps = PLAYERS.map(p => {
    const r = calcScore(p, curEv);
    return { ...p, _score: r.score, _comp: r.components, _trend: formTrend(p), _chScore: courseHistScore(p, curEv), _cfScore: courseFitScore(p, curEv), _dfsVal: Math.round(r.score / (p.dk / 1000) * 100) / 100, _leverage: Math.round((r.score / 10 * 30 - p.own) * 10) / 10 };
  });
  const scores = ps.map(p => p._score);
  const maxS = Math.max(...scores);
  ps = ps.map(p => ({ ...p, _tier: p._score / maxS >= .88 ? 'S' : p._score / maxS >= .72 ? 'A' : p._score / maxS >= .55 ? 'B' : 'C', _pct: Math.round(p._score / maxS * 100) }));
  ps.sort((a, b) => sortD === -1 ? b[sortK] - a[sortK] : a[sortK] - b[sortK]);
  return ps;
}

// ===================== RENDER =====================
const $ = id => document.getElementById(id);
const colors = ['#f55a5a','#f5c542','#00d4aa','#5ba4f5','#a78bfa','#e879a5','#45c4b0','#ff8c42','#22d3ee','#c084fc'];
const tierCls = {S:'tier-s',A:'tier-a',B:'tier-b',C:'tier-c'};

function init() {
  // Event selector
  $('evSel').innerHTML = Object.entries(EVENTS).map(([k,v]) => `<option value="${k}">${v.nm} &mdash; ${v.cr}</option>`).join('');
  // Radar selector
  $('radarSel').innerHTML = PLAYERS.map(p => `<option value="${p.id}">${p.n}</option>`).join('');
  // Tabs
  $('mainTabs').innerHTML = TABS.map(t => `<button class="tab ${t.k===curTab?'on':''}" onclick="setTab(this,'${t.k}')">${t.l}</button>`).join('');
  // Tier buttons
  $('tierBtns').innerHTML = ['all','S','A','B','C'].map(t => `<button class="fbtn ${t===curTier?'on':''}" onclick="setTier(this,'${t}')">${t==='all'?'All Tiers':t+' Tier'}</button>`).join('');
  render();
}

function render() {
  renderStrip(); renderTable(); renderWeights(); renderLineup(); renderCourse(); renderRadar(); renderValue();
}

function renderStrip() {
  const ev = EVENTS[curEv], ps = getPlayers(), top = ps[0];
  const avgS = (ps.reduce((a, p) => a + p._score, 0) / ps.length).toFixed(1);
  const topVal = [...ps].sort((a, b) => b._dfsVal - a._dfsVal)[0];
  $('evTypeBadge').textContent = ev.tp;
  $('statsStrip').innerHTML = `
    <div class="scard"><div class="lb">Tournament</div><div class="vl" style="font-size:15px">${ev.nm}</div><div class="sm">${ev.cr} &middot; Par ${ev.par} &middot; ${ev.yds.toLocaleString()}y</div></div>
    <div class="scard"><div class="lb">Top Projection</div><div class="vl" style="color:var(--gold)">${top.n.split(' ').pop()}</div><div class="sm">Score: ${top._score.toFixed(2)} &middot; $${top.dk.toLocaleString()}</div></div>
    <div class="scard"><div class="lb">Field Avg Score</div><div class="vl">${avgS}</div><div class="sm">${ps.length} players modeled &middot; ${ev.sz} field size</div></div>
    <div class="scard"><div class="lb">Best Value</div><div class="vl" style="color:var(--green)">${topVal.n.split(' ').pop()}</div><div class="sm">${topVal._dfsVal.toFixed(2)}x &middot; $${topVal.dk.toLocaleString()}</div></div>
    <div class="scard"><div class="lb">Purse</div><div class="vl" style="color:var(--cyan)">${ev.purse}</div><div class="sm">${ev.tp} event</div></div>
    <div class="scard"><div class="lb">Key Demand</div><div class="vl" style="font-size:14px">${Object.entries(ev.emph).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([k])=>({ott:'Off-the-Tee',app:'Approach',atg:'Around Green',put:'Putting'}[k])).join(', ')}</div><div class="sm">Highest SG emphasis areas</div></div>
  `;
}

function getColsForTab() {
  const base = [{k:'_rank',l:'#',w:'36px'},{k:'_name',l:'Player'}];
  const add = (k,l,tip) => ({k,l,sort:true,tip});
  switch(curTab) {
    case 'proj': return [...base,
      {k:'_tier',l:'Tier',tip:'Player tier ranking (S/A/B/C) based on overall model score'},
      add('_score','Model Score','Composite fantasy projection score from all weighted model factors'),
      add('sg.tot','SG: Total','Strokes Gained: Total — strokes better than field average per round'),
      add('_cfScore','Course Fit','How well the player\'s skill profile matches this course\'s demands (0-10)'),
      add('_chScore','Course Hx','Course History — past performance at this specific venue (0-10)'),
      add('_trend','Trend','Form trend — positive means improving (recent 3 events vs older 3 events)'),
      add('dk','Salary','DraftKings salary'),
      add('own','Own%','Projected DraftKings ownership percentage'),
      {k:'_act',l:''}];
    case 'sg': return [...base,
      add('sg.tot','SG: Total','Strokes Gained: Total — overall strokes better than field per round'),
      add('sg.ott','SG: OTT','Strokes Gained: Off the Tee — driving performance vs field'),
      add('sg.app','SG: APP','Strokes Gained: Approach — iron play into greens vs field'),
      add('sg.atg','SG: ATG','Strokes Gained: Around the Green — chipping and pitching vs field'),
      add('sg.put','SG: Putt','Strokes Gained: Putting — putting performance vs field'),
      add('gir','GIR%','Greens in Regulation percentage — hitting the green in the expected number of strokes'),
      add('_score','Score','Composite fantasy projection score'),
      {k:'_act',l:''}];
    case 'form': return [...base,
      {k:'_spark',l:'Last 10 (← Recent)',tip:'Finish positions in last 10 tournaments — taller bars = better finishes'},
      add('_score','Score','Composite fantasy projection score'),
      add('_trend','Trend','Form trend — positive means improving (recent 3 events vs older 3 events)'),
      add('brd','Birdies/Rd','Average birdies made per round this season'),
      add('par3','Par 3 Avg','Average score on par 3 holes (lower is better)'),
      add('par5','Par 5 Avg','Average score on par 5 holes (lower is better)'),
      {k:'_act',l:''}];
    case 'course': return [...base,
      add('_cfScore','Course Fit','How well the player\'s skill profile matches this course\'s demands (0-10)'),
      add('_chScore','Course Hx','Course History — weighted score from past finishes at this venue (0-10)'),
      {k:'_chDetail',l:'Past Results',tip:'Actual past finish positions at this venue (most recent years)'},
      add('sg.app','SG: APP','Strokes Gained: Approach — iron play into greens vs field'),
      add('sg.ott','SG: OTT','Strokes Gained: Off the Tee — driving performance vs field'),
      add('_score','Score','Composite fantasy projection score'),
      {k:'_act',l:''}];
    case 'dfs': return [...base,
      add('dk','Salary','DraftKings salary'),
      add('_score','Score','Composite fantasy projection score'),
      add('_dfsVal','Value','Points per $1,000 salary — higher means better value for the price'),
      add('own','Own%','Projected DraftKings ownership percentage'),
      add('_leverage','Leverage','Model projection vs ownership — positive = underowned relative to skill (contrarian edge)'),
      {k:'_tier',l:'Tier',tip:'Player tier ranking (S/A/B/C) based on overall model score'},
      {k:'_act',l:''}];
  }
}

function getVal(p, k) {
  if (k.startsWith('sg.')) return p.sg[k.split('.')[1]];
  return p[k];
}

function renderTable() {
  const cols = getColsForTab();
  let ps = getPlayers();
  const q = $('search').value.toLowerCase();
  if (q) ps = ps.filter(p => p.n.toLowerCase().includes(q));
  if (curTier !== 'all') ps = ps.filter(p => p._tier === curTier);
  const maxScore = Math.max(...getPlayers().map(p => p._score));

  $('tHead').innerHTML = '<tr>' + cols.map(c => {
    const cls = c.sort && sortK === c.k ? 'sd' : '';
    const arr = c.sort && sortK === c.k ? (sortD === -1 ? ' &#9660;' : ' &#9650;') : '';
    const oc = c.sort ? `onclick="doSort('${c.k}')"` : '';
    const tip = c.tip ? `data-tip="${c.tip}"` : '';
    return `<th class="${cls}" ${oc} ${tip}>${c.l}${arr}</th>`;
  }).join('') + '</tr>';

  $('tBody').innerHTML = ps.map((p, i) => {
    const rk = i + 1;
    const rc = rk <= 3 ? `rk-${rk}` : '';
    const ac = colors[p.id % colors.length];
    const ini = p.n.split(' ').map(w => w[0]).join('');
    const inLU = lineup.includes(p.id);

    return '<tr>' + cols.map(c => {
      switch (c.k) {
        case '_rank': return `<td class="rk ${rc}">${rk}</td>`;
        case '_name': { const livBadge = p.liv ? ' <span style="background:var(--orange-d);color:var(--orange);padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;margin-left:4px;vertical-align:middle" title="'+(p.majors_only||'LIV Golf - Majors only')+'">LIV</span>' : ''; return `<td><div class="pc"><div class="av" style="background:${ac}18;color:${ac}">${ini}</div><div><div class="pn">${p.n}${livBadge}</div><div class="py">${p.c}</div></div></div></td>`; }
        case '_tier': return `<td><span class="tier ${tierCls[p._tier]}">${p._tier}</span></td>`;
        case '_score': {
          const pct = (p._score / maxScore * 100).toFixed(0);
          return `<td><strong>${p._score.toFixed(2)}</strong><span class="bar"><span class="bar-f" style="width:${pct}%;background:var(--green)"></span></span></td>`;
        }
        case '_cfScore': case '_chScore': {
          const v = p[c.k];
          const clr = v >= 8 ? 'var(--green)' : v >= 6 ? 'var(--blue)' : v >= 4 ? 'var(--gold)' : 'var(--red)';
          return `<td><strong style="color:${clr}">${v.toFixed(1)}</strong><span class="bar"><span class="bar-f" style="width:${v*10}%;background:${clr}"></span></span></td>`;
        }
        case '_trend': {
          const v = p._trend;
          const clr = v > 1 ? 'var(--green)' : v < -1 ? 'var(--red)' : 'var(--t2)';
          const arrow = v > 1 ? '&#9650;' : v < -1 ? '&#9660;' : '&#8212;';
          return `<td style="color:${clr};font-weight:700">${arrow} ${v > 0 ? '+' : ''}${v.toFixed(1)}</td>`;
        }
        case 'sg.tot': case 'sg.ott': case 'sg.app': case 'sg.atg': case 'sg.put': {
          const v = getVal(p, c.k);
          return `<td class="${v >= 0 ? 'sg-p' : 'sg-n'}">${v >= 0 ? '+' : ''}${v.toFixed(2)}</td>`;
        }
        case 'dk': return `<td>${p.dk > 0 ? '$' + p.dk.toLocaleString() : '<span style="color:var(--t3)">N/A</span>'}</td>`;
        case 'own': return `<td style="color:var(--t2)">${p.own}%</td>`;
        case 'gir': return `<td>${p.gir}%</td>`;
        case 'brd': return `<td>${p.brd}</td>`;
        case 'par3': return `<td>${p.par3.toFixed(2)}</td>`;
        case 'par5': return `<td>${p.par5.toFixed(2)}</td>`;
        case '_dfsVal': {
          const top30 = [...getPlayers()].sort((a,b) => b._dfsVal - a._dfsVal).slice(0, Math.ceil(getPlayers().length * 0.3)).map(x => x.id);
          const isVal = top30.includes(p.id);
          return `<td style="${isVal ? 'color:var(--green);font-weight:700' : ''}">${p._dfsVal.toFixed(2)}x</td>`;
        }
        case '_leverage': {
          const v = p._leverage;
          const cls = v > 3 ? 'lev-pos' : v < -3 ? 'lev-neg' : 'lev-neut';
          return `<td class="lev ${cls}">${v > 0 ? '+' : ''}${v.toFixed(1)}%</td>`;
        }
        case '_spark': { const avg = (p.form.reduce((a,b)=>a+b,0)/p.form.length).toFixed(1); const avgClr = avg <= 10 ? 'var(--green)' : avg <= 20 ? 'var(--blue)' : 'var(--red)'; return `<td>${renderSpark(p.form)} <span style="font-size:11px;font-weight:700;color:${avgClr};margin-left:6px" data-tip="Average finish position over last 10 events">avg ${avg}</span></td>`; }
        case '_chDetail': {
          const hist = p.ch[curEv] || [];
          return `<td style="font-size:11px;color:var(--t2)">${hist.length ? hist.map(f => `<span style="color:${f<=3?'var(--green)':f<=10?'var(--blue)':f<=20?'var(--t2)':'var(--red)'};margin-right:4px;font-weight:600">T${f}</span>`).join('') : '<span style="color:var(--t3)">No history</span>'}</td>`;
        }
        case '_act': return `<td><button class="abtn ${inLU?'in':''}" onclick="togLU(${p.id})">${inLU?'&#10003;':'+'}</button></td>`;
        default: return '<td></td>';
      }
    }).join('') + '</tr>';
  }).join('');
}

function renderSpark(form) {
  const max = Math.max(...form, 30);
  return '<span class="spark">' + [...form].reverse().map((f, i) => {
    const h = Math.max(3, (1 - f / max) * 20);
    const clr = f <= 3 ? 'var(--green)' : f <= 10 ? 'var(--blue)' : f <= 20 ? 'var(--gold)' : 'var(--red)';
    return `<b style="height:${h}px;background:${clr}" title="T${f}"></b>`;
  }).join('') + '</span>';
}

function renderValue() {
  const ps = [...getPlayers()].sort((a, b) => b._dfsVal - a._dfsVal).slice(0, 8);
  $('valuePicks').innerHTML = ps.map((p, i) => {
    const lev = p._leverage;
    const levClr = lev > 3 ? 'var(--green)' : lev < -3 ? 'var(--red)' : 'var(--t2)';
    return `<div class="vp-card">
      <div class="vp-rank">${i+1}</div>
      <div class="av" style="background:${colors[p.id%colors.length]}18;color:${colors[p.id%colors.length]};width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0">${p.n.split(' ').map(w=>w[0]).join('')}</div>
      <div class="vp-info">
        <div class="vp-name">${p.n} <span class="tier ${tierCls[p._tier]}" style="margin-left:4px">${p._tier}</span></div>
        <div class="vp-meta">
          SG:${p.sg.tot >= 0?'+':''}${p.sg.tot.toFixed(2)} &middot;
          Form: ${formScore(p).toFixed(1)}/10 &middot;
          Course Hx: ${p._chScore.toFixed(1)}/10 &middot;
          Leverage: <span style="color:${levClr};font-weight:600">${lev>0?'+':''}${lev.toFixed(1)}%</span>
        </div>
      </div>
      <div class="vp-right">
        <div class="vp-val">${p._dfsVal.toFixed(2)}x</div>
        <div class="vp-sal">$${p.dk.toLocaleString()} &middot; ${p.own}% own</div>
      </div>
    </div>`;
  }).join('');
}

function renderWeights() {
  $('wPanel').innerHTML = Object.entries(W).map(([k,v]) =>
    `<div class="wr"><span class="wl">${WNAMES[k]}</span><input type="range" min="0" max="40" value="${v}" oninput="setW('${k}',this.value)"><span class="wv" id="wv_${k}">${v}%</span></div>`
  ).join('') + `<div style="margin-top:8px;font-size:10px;color:var(--t3)">Total: ${Object.values(W).reduce((a,b)=>a+b,0)}% (auto-normalized)</div>`;
}

function renderLineup() {
  const ps = getPlayers();
  let html = '';
  for (let i = 0; i < MAXLU; i++) {
    const pid = lineup[i];
    const p = pid ? ps.find(x => x.id === pid) : null;
    html += `<div class="ls"><div class="ln ${p?'ok':''}">${i+1}</div><div class="lp ${p?'':'mt'}">${p?p.n:'Empty slot'}</div>${p?`<div class="lsc">${p._score.toFixed(1)}</div><button class="lrm" onclick="rmLU(${p.id})">&#10005;</button>`:''}</div>`;
  }
  const totS = lineup.reduce((s, pid) => { const p = ps.find(x => x.id === pid); return s + (p ? p._score : 0); }, 0);
  const totSal = lineup.reduce((s, pid) => { const p = PLAYERS.find(x => x.id === pid); return s + (p ? p.dk : 0); }, 0);
  const salPct = Math.min(100, totSal / SALCAP * 100);
  const salClr = totSal > SALCAP ? 'var(--red)' : totSal > SALCAP * 0.85 ? 'var(--gold)' : 'var(--green)';
  const remSal = SALCAP - totSal;
  const avgRem = lineup.length < MAXLU && lineup.length > 0 ? Math.round(remSal / (MAXLU - lineup.length)) : 0;

  html += `<div class="ltot"><span class="ll">Projected Score</span><span class="lv">${totS.toFixed(1)}</span></div>`;
  html += `<div class="ltot" style="padding-top:0"><span class="ll">Salary</span><span class="lv" style="color:${salClr}">$${totSal.toLocaleString()} / $${SALCAP.toLocaleString()}</span></div>`;
  html += `<div class="sal-bar"><div class="sal-bar-f" style="width:${salPct}%;background:${salClr}"></div></div>`;
  if (lineup.length > 0 && lineup.length < MAXLU) {
    html += `<div style="margin-top:6px;font-size:11px;color:var(--t3)">$${remSal.toLocaleString()} remaining &middot; ~$${avgRem.toLocaleString()} avg per slot</div>`;
  }
  $('luPanel').innerHTML = html;
}

function renderCourse() {
  const ev = EVENTS[curEv];
  const tNames = {length:'Length Demand',precision:'Precision',scrambling:'Scrambling',putting:'Putting Surface',iron_play:'Iron Play',experience:'Experience Weight',course_history:'History Weight'};
  const tClrs = {length:'var(--red)',precision:'var(--blue)',scrambling:'var(--gold)',putting:'var(--green)',iron_play:'var(--purple)',experience:'var(--t2)',course_history:'var(--cyan)'};
  $('coursePanel').innerHTML = `
    <div style="margin-bottom:12px;font-size:12px;color:var(--t2)"><strong style="color:var(--t1)">${ev.cr}</strong><br>Par ${ev.par} &middot; ${ev.yds.toLocaleString()} yards &middot; ${ev.tp} &middot; ${ev.purse} purse &middot; ${ev.sz}-player field</div>
    ${Object.entries(ev.traits).map(([k,v]) => `<div class="cb-r"><div class="cb-l">${tNames[k]}</div><div class="cb"><div class="cb-f" style="width:${v}%;background:${tClrs[k]}"></div><div class="cb-v">${v}</div></div></div>`).join('')}
    <div style="margin-top:12px;font-size:11px;color:var(--t3)"><strong>SG Weights:</strong> ${Object.entries(ev.emph).map(([k,v]) => `${({ott:'OTT',app:'APP',atg:'ATG',put:'Putt'})[k]} ${(v*100).toFixed(0)}%`).join(' &middot; ')}</div>
  `;
}

function renderRadar() {
  const pid = parseInt($('radarSel').value);
  const p = PLAYERS.find(x => x.id === pid);
  if (!p) return;
  const ps = getPlayers();
  const pd = ps.find(x => x.id === pid);

  // SVG radar chart
  const labels = ['SG: OTT','SG: APP','SG: ATG','SG: Putt','GIR','Scramble','Drive Dist','Course Fit'];
  const maxVals = [1.2, 1.3, 0.5, 0.5, 75, 70, 325, 10];
  const minVals = [-0.3, -0.2, -0.3, -0.5, 60, 48, 270, 0];
  const vals = [p.sg.ott, p.sg.app, p.sg.atg, p.sg.put, p.gir, p.scr, p.dr.dist, pd ? pd._cfScore : 5];

  const cx = 140, cy = 130, r = 95, n = labels.length;
  const angle = (i) => (Math.PI * 2 * i / n) - Math.PI / 2;
  const norm = (v, i) => Math.max(0, Math.min(1, (v - minVals[i]) / (maxVals[i] - minVals[i])));

  let gridSvg = '';
  [0.25, 0.5, 0.75, 1.0].forEach(pct => {
    const pts = [];
    for (let i = 0; i < n; i++) pts.push(`${cx + r * pct * Math.cos(angle(i))},${cy + r * pct * Math.sin(angle(i))}`);
    gridSvg += `<polygon points="${pts.join(' ')}" fill="none" stroke="var(--s3)" stroke-width="1"/>`;
  });

  let axisSvg = '';
  for (let i = 0; i < n; i++) {
    const x = cx + r * Math.cos(angle(i)), y = cy + r * Math.sin(angle(i));
    axisSvg += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--s3)" stroke-width="1"/>`;
    const lx = cx + (r + 18) * Math.cos(angle(i)), ly = cy + (r + 18) * Math.sin(angle(i));
    const anchor = Math.abs(Math.cos(angle(i))) < 0.3 ? 'middle' : Math.cos(angle(i)) > 0 ? 'start' : 'end';
    axisSvg += `<text x="${lx}" y="${ly}" text-anchor="${anchor}" dominant-baseline="middle" fill="var(--t3)" font-size="9" font-weight="600">${labels[i]}</text>`;
  }

  const dataPts = vals.map((v, i) => {
    const nv = norm(v, i);
    return `${cx + r * nv * Math.cos(angle(i))},${cy + r * nv * Math.sin(angle(i))}`;
  });

  const color = colors[p.id % colors.length];
  const dataSvg = `<polygon points="${dataPts.join(' ')}" fill="${color}22" stroke="${color}" stroke-width="2"/>`;
  const dotsSvg = dataPts.map((pt) => `<circle cx="${pt.split(',')[0]}" cy="${pt.split(',')[1]}" r="3" fill="${color}"/>`).join('');

  $('radarPanel').innerHTML = `
    <div class="radar-wrap"><svg width="280" height="270" viewBox="0 0 280 270">${gridSvg}${axisSvg}${dataSvg}${dotsSvg}</svg></div>
    <div style="text-align:center;font-size:12px;margin-top:4px">
      <strong style="color:${color}">${p.n}</strong> &middot;
      Model: <strong style="color:var(--green)">${pd ? pd._score.toFixed(2) : '—'}</strong> &middot;
      Tier: <span class="tier ${pd ? tierCls[pd._tier] : ''}">${pd ? pd._tier : '—'}</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;margin-top:10px;font-size:11px;color:var(--t2)">
      <div>SG Total: <strong class="${p.sg.tot>=0?'sg-p':'sg-n'}">${p.sg.tot>=0?'+':''}${p.sg.tot.toFixed(2)}</strong></div>
      <div>Drive: <strong>${p.dr.dist}y / ${p.dr.acc}%</strong></div>
      <div>Form Score: <strong>${formScore(p).toFixed(1)}/10</strong></div>
      <div>Course Hx: <strong>${pd?pd._chScore.toFixed(1):'—'}/10</strong></div>
      <div>Birdies/Rd: <strong>${p.brd}</strong></div>
      <div>DFS Value: <strong style="color:var(--green)">${pd?pd._dfsVal.toFixed(2):'—'}x</strong></div>
    </div>
  `;
}

// ===================== INTERACTIONS =====================
function changeEvent() { curEv = $('evSel').value; render(); }
function setTab(el, t) { document.querySelectorAll('.tab').forEach(x => x.classList.remove('on')); el.classList.add('on'); curTab = t;
  if (t==='dfs'){sortK='_dfsVal';sortD=-1} else if(t==='sg'){sortK='sg.tot';sortD=-1} else if(t==='course'){sortK='_cfScore';sortD=-1} else{sortK='_score';sortD=-1} render(); }
function setTier(el, t) { document.querySelectorAll('#tierBtns .fbtn').forEach(x => x.classList.remove('on')); el.classList.add('on'); curTier = t; renderTable(); }
function doSort(k) { if (sortK === k) sortD *= -1; else { sortK = k; sortD = -1; } renderTable(); }
function setW(k, v) { W[k] = parseInt(v); document.getElementById('wv_'+k).textContent = v+'%'; render(); }
function resetWeights() { W = {sgTot:20,sgSplit:18,form:18,courseHist:15,courseFit:12,ballstriking:8,shortGame:9}; render(); }
function togLU(pid) { const i = lineup.indexOf(pid); if (i >= 0) lineup.splice(i, 1); else if (lineup.length < MAXLU) { const p = PLAYERS.find(x => x.id === pid); if (p && p.dk > 0) lineup.push(pid); } renderTable(); renderLineup(); }
function rmLU(pid) { lineup = lineup.filter(id => id !== pid); renderTable(); renderLineup(); }
function clearLineup() { lineup = []; renderTable(); renderLineup(); }
function autoLineup() {
  // Greedy knapsack: best value within salary cap
  lineup = [];
  const ps = [...getPlayers()].sort((a, b) => b._dfsVal - a._dfsVal);
  let remSal = SALCAP;
  for (const p of ps) {
    if (lineup.length >= MAXLU) break;
    if (p.dk > 0 && p.dk <= remSal) { lineup.push(p.id); remSal -= p.dk; }
  }
  renderTable(); renderLineup();
}

init();
</script>
</body>
</html>
